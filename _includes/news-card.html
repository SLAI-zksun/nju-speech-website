<article class="news-card">
  <div class="news-card-head">
    <div class="news-card-titles">
      <h3>
        <a href="{{ include.url }}" target="_blank" rel="noopener noreferrer">
          <span class="lang-zh">{{ include.title_zh }}</span><span class="lang-en">{{ include.title_en }}</span>
        </a>
      </h3>
      <div class="news-card-meta">
        <span class="news-card-date">{{ include.date }}</span>
        <span class="news-card-keywords">
          <span class="lang-zh">{{ include.keywords_zh }}</span><span class="lang-en">{{ include.keywords_en }}</span>
        </span>
      </div>
    </div>
  </div>
  {% if include.summary_zh or include.summary_en %}
    <p class="news-card-summary">
      <span class="lang-zh">{{ include.summary_zh }}</span><span class="lang-en">{{ include.summary_en }}</span>
    </p>
  {% endif %}
</article>
