  title_zh: "2027 Fall 研究生招生说明（硕士 / 博士）"
  title_en: "2027 Fall Graduate Recruitment (Master & Ph.D.)"
  keywords_zh: "招生｜2027 Fall｜语音智能"
  keywords_en: "Recruitment · 2027 Fall · Speech AI"
  url: "mailto:shuaiwang@nju.edu.cn?subject=NJU-SPEECH%20%E6%8B%9B%E7%94%9F%E5%92%A8%E8%AF%A2"
  summary_zh: "面向 2027 Fall 持续招收硕士与博士研究生；欢迎对说话人建模、目标说话人处理、语音/音频/音乐理解与生成、类脑语音处理、端到端语音大模型等方向感兴趣的同学邮件联系，并附上简历、成绩单与研究兴趣陈述。"
  summary_en: "We recruit Master and Ph.D. students for 2027 Fall. If you are interested in speaker modeling, target speaker processing, speech/audio/music understanding and generation, brain-inspired speech processing, or end-to-end speech LLMs, please email with your CV, transcripts, and a brief statement of research interests."

