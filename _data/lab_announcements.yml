  summary_zh: "常年招收 Research Assistant；可选择南京大学苏州校区、深圳河套学院、香港中文大学（深圳）等合作地点，部分岗位可远程参与；表现优秀者可推荐大厂实习或国内外高校深造，并可与 Haizhou Li 教授团队联合指导。"
  summary_en: "Year-round RA openings are available across Suzhou campus, Shenzhen Loop Area Institute, CUHK-Shenzhen, and remote options. Strong performers may receive internship recommendations and further-study referrals, with opportunities for joint supervision with Prof. Haizhou Li’s team."
